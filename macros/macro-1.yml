fileVersion: 1
id: "1"
macroString: |
  {#-- The below block of code initialises variables in case of node typess using advance deployment strategy #}

  {% if desiredState %}
      {% set columns = desiredState.columns %}
      {% set storageLocations = desiredState.storageLocations %}
      {% set config = desiredState.config %}
      {% set sources = desiredState.sources %}
      {% set node = desiredState.node %}
      {% set parameters = desiredState.parameters %}
  {% endif %}


  {%- macro sortorder_by_colv(return) -%}
      {%- set nsVariables = namespace(sortcolNames="") -%}
      {%if config.orderby %}
          {%- for i in config.orderbycolumn.get('items') -%}
              {%- set colName = i.sortColName.name -%}
              {%- set colOrder = i.sortOrder -%}
  	        {%- if loop.first -%}	      
  		        {%- set nsVariables.sortcolNames = '"' + colName + '"' + colOrder -%}	  
  	        {%- else -%}      
  		        {%- set nsVariables.sortcolNames = nsVariables.sortcolNames + ',' + '"' + colName + '"' + colOrder-%}	  
  	        {%- endif -%}
          {%- endfor -%}	
              {%- set nsVariables.sortcolNames = 'order by' + nsVariables.sortcolNames -%}
   
      {% endif %} 
      
      {{- nsVariables.sortcolNames -}}
   
  {%- endmacro -%}




  {#-- This macro will split the join clause into from and rest of the clauses like where,groupby,orderby ,qualify  #}
  {#-- Input parmeters   - joinclause #}
  {#-- Return            - from clause and other clauses #}


  {%- macro get_clause( joinclause , ret_clause ) -%}

              {% set join_clause = joinclause %}
              {% set has_where_clause = 'where'in join_clause %}
              {% set has_WHERE_clause = 'WHERE'in join_clause %}
              {% set has_order_clause = 'order by'in join_clause %}
              {% set has_ORDER_clause = 'ORDER BY'in join_clause %}
              {% set has_group_clause =  'group by'in join_clause %}
              {% set has_GROUP_clause = 'GROUP BY'in join_clause %}
              {% set has_qualify_clause =  'qualify'in join_clause %}
              {% set has_QUALIFY_clause = 'QUALIFY'in join_clause %}

             

              {% set clause='default' %}

              {% if has_where_clause %}

                  {% set keyword='where'%} 
                  {% set clause='where_clause' %}
    
              {% elif  has_WHERE_clause %}

                   {% set keyword='WHERE'%}
                   {% set clause='where_clause' %}
              {% endif %}

              {% if has_group_clause and clause != 'where_clause'  %}

                   {% set keyword='group by'%}
                   {% set clause='group_clause' %}
              
              {% elif  has_GROUP_clause and clause != 'where_clause' %}

                   {% set keyword='GROUP BY'%}
                   {% set clause='group_clause' %}

              {% endif %}
  			
              {% if has_qualify_clause and clause != 'where_clause' and clause != 'group_clause'  %}

                   {% set keyword='qualify'%}
                   {% set clause='qualify_clause' %}
              
              {% elif  has_QUALIFY_clause and clause != 'where_clause' and clause != 'group_clause'  %}

                   {% set keyword='QUALIFY'%}
                   {% set clause='qualify_clause' %}

              {% endif %}            

  			{% if has_order_clause and  clause != 'where_clause' and clause != 'group_clause' and clause != 'qualify_clause' %}

                   {% set keyword='order by'%}
                   {% set clause='order_clause' %}
              
              {% elif has_ORDER_clause and clause != 'where_clause' and clause != 'group_clause' and clause != 'qualify_clause' %}

                   {% set keyword='ORDER BY'%}
                   {% set clause='order_clause' %}

              {% endif %}



              {% if clause == 'where_clause' %}
                 {% set parts = join_clause.split(keyword) %}
                 {% set from_clause = parts[0] %}
                 {% set add_clause = 'AND' + join_clause.split(keyword)[1] %}

              {% elif clause == 'group_clause' %}

                 {% set parts = join_clause.split(keyword) %}
                 {% set from_clause = parts[0] %}
                 {% set add_clause = 'group by' + join_clause.split(keyword)[1] %}

              
              {% elif clause == 'qualify_clause' %}

                 {% set parts = join_clause.split(keyword) %}
                 {% set from_clause = parts[0] %}
                 {% set add_clause = 'qualify' + join_clause.split(keyword)[1] %}


              {% elif clause == 'order_clause' %}

                 {% set parts = join_clause.split(keyword) %}
                 {% set from_clause = parts[0] %}
                 {% set add_clause =  'order by' + join_clause.split(keyword)[1] %}
                 

              {% else %}

                 {% set from_clause = join_clause %}
                 {% set add_clause = '' %}

              {% endif %}
  			
  			{% if ret_clause == 'from' %}
  			   {{ from_clause }}
  			{% else %}
  			   {{ add_clause }}
  			{% endif %}
  			
  			
  {%- endmacro -%}

  {####################################################################################################################################
  Input: namespace – An object containing optional advanced configuration properties related to Snowflake task creation.
  Description: This macro centralizes the logic for handling advanced Snowflake task configuration.
  Output: A dynamically constructed SQL fragment containing all valid advanced task creation attributes derived from the provided namespace.
  ######################################################################################################################################}
  {% macro getadvancedTaskOptions(ns) %}
      {%- set ns.nodeComment = "COMMENT = '" ~ node.description | trim ~ "'" if node.description | default('') | trim else "" %}

      {%- if config.spfcUserToggle -%}
          {%- if parameters.targetTaskExecuteAsUser | default('') == 'DEV ENVIRONMENT' -%}
              {%- set ns.userServiceAcct  = 'EXECUTE AS USER ' + config.userName | trim %}
          {%- else -%}
              {%- set ns.userServiceAcct = 'EXECUTE AS USER ' + parameters.targetTaskExecuteAsUser | default('') %}
          {%- endif -%}
      {%- endif -%}

      {%- if config.schedulePeriodOption not in ['Predecessor'] %}

          {%- if config.autoSuspendToggle %}
              {%- set ns.suspendTask = 'SUSPEND_TASK_AFTER_NUM_FAILURES = ' + config.numFailures | trim %}
          {%- endif -%}

          {%- if config.autoRetryToggle -%}
              {%- set ns.autoTry = 'TASK_AUTO_RETRY_ATTEMPTS = ' + config.retryAttmpt | trim %}
          {%- endif -%}

          {%- if config.overlapExecToggle %}
              {%- set ns.overLapExec = 'OVERLAP_POLICY  =  ALLOW_CHILD_OVERLAP' %}
          {%- else %}
              {%- set ns.overLapExec = 'OVERLAP_POLICY  =  NO_OVERLAP' %}
          {%- endif -%}

          {%- if config.taskGraphToggle -%}
              {%- set ns.configJSON = 'CONFIG = $$' + config.configJSON | trim + '$$' %}
          {%- endif -%}

          {%- if config.errNotifyToggle -%}
              {%- if parameters.targetTaskErrorIntegration | default('') == 'DEV ENVIRONMENT' -%}
                  {%- set ns.errorIntegration = 'ERROR_INTEGRATION = ' + config.errIntName | trim %}
              {%- else -%}
                  {%- set ns.errorIntegration = 'ERROR_INTEGRATION = ' + parameters.targetTaskErrorIntegration | default('') %}
              {%- endif -%}
          {%- endif -%}

          {%- if config.successNotifyToggle -%}
              {% if parameters.targetTaskSuccessIntegration | default('') == 'DEV ENVIRONMENT' -%}
                  {%- set ns.successIntegration = 'SUCCESS_INTEGRATION = ' + config.succIntName | trim %}
              {%- else -%}
                  {%- set ns.successIntegration = 'SUCCESS_INTEGRATION = ' + parameters.targetTaskSuccessIntegration | default('') %}
              {%- endif -%}
          {%- endif -%}

      {%- endif -%}
  {% endmacro %}

  {####################################################################################################################################
  Input: serverlessSize (string)

  Output: Returns the server size only (e.g., XSMALL).

  Description:
      Handles both old and new formats safely.
      If the value contains a '.', it returns the part after the dot.
      If there is no '.', it returns the value as-is.
      Returns nothing if input is missing.
  ######################################################################################################################################}
  {%- macro getServerSize(serverlessSize) %}

      {%- if serverlessSize %}
          {%- set parts = serverlessSize.split('.') %}
          {{ parts[-1] }}
      {%- endif %}

  {%- endmacro %}
name: macro
type: Macro
